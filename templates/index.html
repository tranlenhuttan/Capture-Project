<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capture Project</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- ═══ Sidebar ═══ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <img src="/static/images/logo.png" alt="Logo" class="logo-img" />
          <span>Capture Project</span>
        </div>
      </div>

      <button
        class="btn-upload"
        onclick="document.getElementById('fileInput').click()"
      >
        <span class="material-icons-round">add</span>
        <span>Upload</span>
      </button>
      <input type="file" id="fileInput" multiple hidden />

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" id="navFiles">
          <span class="material-icons-round">folder_open</span>
          <span>My Files</span>
        </a>
        <a href="#" class="nav-item" id="navStarred">
          <span class="material-icons-round">star_outline</span>
          <span>Starred</span>
        </a>
      </nav>

      <div class="storage-info">
        <div class="storage-bar">
          <div class="storage-fill" id="storageFill"></div>
        </div>
        <p class="storage-text" id="storageText">0 B of 15 GB used</p>
      </div>
    </aside>

    <!-- ═══ Main ═══ -->
    <main class="main">
      <!-- Topbar -->
      <header class="topbar">
        <button class="btn-icon mobile-menu" id="mobileMenu">
          <span class="material-icons-round">menu</span>
        </button>

        <div class="search-bar">
          <span class="material-icons-round">search</span>
          <input
            type="text"
            id="searchInput"
            placeholder="Search in Capture Project"
          />
        </div>

        <button class="btn-icon" id="toggleView">
          <span class="material-icons-round" id="viewIcon">grid_view</span>
        </button>
      </header>

      <!-- Breadcrumb -->
      <div class="breadcrumb-bar">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="file-count" id="fileCount"></div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar" id="toolbar">
        <button class="btn-tool" onclick="showNewFolderDialog()">
          <span class="material-icons-round">create_new_folder</span>
          <span>New Folder</span>
        </button>
        <button class="btn-tool" onclick="sortFiles('name')">
          <span class="material-icons-round">sort_by_alpha</span>
          <span>Name</span>
        </button>
        <button class="btn-tool" onclick="sortFiles('date')">
          <span class="material-icons-round">calendar_today</span>
          <span>Date</span>
        </button>
        <button class="btn-tool" onclick="sortFiles('size')">
          <span class="material-icons-round">straighten</span>
          <span>Size</span>
        </button>
      </div>

      <!-- Drop Zone -->
      <div class="drop-overlay" id="dropOverlay">
        <div class="drop-content">
          <span class="material-icons-round">cloud_upload</span>
          <p>Drop files here to upload</p>
        </div>
      </div>

      <!-- Files Grid -->
      <div class="files-container" id="filesContainer">
        <div class="files-grid" id="filesGrid"></div>
      </div>

      <!-- Empty State -->
      <div class="empty-state hidden" id="emptyState">
        <span class="material-icons-round">cloud_off</span>
        <h3>No files here</h3>
        <p>Upload files or create a folder to get started</p>
      </div>

      <!-- Upload Progress -->
      <div class="upload-progress hidden" id="uploadProgress">
        <span>Uploading...</span>
        <div class="upload-bar">
          <div class="upload-fill" id="uploadFill"></div>
        </div>
        <p id="uploadStatus"></p>
      </div>
    </main>

    <!-- ═══ Context Menu (dynamic) ═══ -->
    <div class="context-menu hidden" id="contextMenu">
      <div class="ctx-menu-inner"></div>
    </div>

    <!-- ═══ Preview Modal ═══ -->
    <div class="modal-overlay hidden" id="previewModal">
      <div class="modal modal-preview">
        <div class="modal-header">
          <h3 id="previewTitle">Preview</h3>
          <button class="btn-icon" onclick="closeModal('previewModal')">
            <span class="material-icons-round">close</span>
          </button>
        </div>
        <div class="modal-body" id="previewBody"></div>
      </div>
    </div>

    <!-- ═══ New Folder Modal ═══ -->
    <div class="modal-overlay hidden" id="folderModal">
      <div class="modal">
        <div class="modal-header">
          <h3>New Folder</h3>
          <button class="btn-icon" onclick="closeModal('folderModal')">
            <span class="material-icons-round">close</span>
          </button>
        </div>
        <div class="modal-body">
          <input type="text" id="folderNameInput" placeholder="Folder name" />
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModal('folderModal')">
            Cancel
          </button>
          <button class="btn-primary" onclick="createFolder()">Create</button>
        </div>
      </div>
    </div>

    <!-- ═══ Rename Modal ═══ -->
    <div class="modal-overlay hidden" id="renameModal">
      <div class="modal">
        <div class="modal-header">
          <h3>Rename</h3>
          <button class="btn-icon" onclick="closeModal('renameModal')">
            <span class="material-icons-round">close</span>
          </button>
        </div>
        <div class="modal-body">
          <input type="text" id="renameInput" placeholder="New name" />
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModal('renameModal')">
            Cancel
          </button>
          <button class="btn-primary" onclick="renameFile()">Rename</button>
        </div>
      </div>
    </div>

    <!-- ═══ Toast ═══ -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/app.js"></script>
  </body>
</html>
